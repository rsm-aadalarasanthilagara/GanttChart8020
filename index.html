<style>
*{box-sizing:border-box;margin:0;padding:0;}
.gw{padding:12px 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
.gtitle{font-size:16px;font-weight:700;color:var(--color-text-primary);border:none;background:transparent;outline:none;width:100%;}
.gtitle:focus{border-bottom:2px solid #378ADD;}
.gsub{font-size:10px;color:var(--color-text-secondary);margin-top:2px;margin-bottom:10px;}
.leg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;font-size:10px;color:var(--color-text-secondary);align-items:center;}
.li{display:flex;align-items:center;gap:3px;}
.ld{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.tbl-wrap{overflow-x:auto;background:var(--color-background-primary);border-radius:10px;border:0.5px solid var(--color-border-tertiary);}
table{border-collapse:collapse;min-width:900px;width:100%;}
th{font-size:9px;font-weight:600;color:var(--color-text-secondary);text-align:center;padding:5px 1px;background:var(--color-background-secondary);border-bottom:1px solid var(--color-border-tertiary);white-space:nowrap;border-right:0.5px solid var(--color-border-tertiary);}
th.lh{text-align:left;padding-left:8px;min-width:140px;}
th.th2{text-align:left;padding-left:5px;min-width:200px;}
th.tdy{background:#7f0000;color:#ffaaaa;font-weight:800;}
th.wk{opacity:0.55;}
th.ms-h{background:#fff8e0;color:#a06000;}
td{padding:0 1px;border-bottom:0.5px solid var(--color-border-tertiary);border-right:0.5px solid var(--color-border-tertiary);}
.sl{font-size:9px;font-weight:700;padding:3px 6px;white-space:nowrap;border-left:3px solid transparent;cursor:pointer;}
.tl{font-size:9px;padding:3px 5px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--color-text-primary);cursor:pointer;}
.sl:hover,.tl:hover{opacity:0.7;}
.ob{font-size:8px;font-weight:700;color:#fff;padding:2px 6px;border-radius:20px;white-space:nowrap;cursor:pointer;}
.dc{padding:0;position:relative;vertical-align:middle;height:22px;}
.bar{height:14px;border-radius:4px;display:flex;align-items:center;padding:0 5px;font-size:8px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;margin:4px 1px 4px 0;cursor:pointer;transition:opacity .15s;}
.bar:hover{opacity:.8;}
.bar.done{opacity:.45;}
.bar.ip{box-shadow:0 0 0 2px rgba(255,255,255,0.4);}
.tdl{position:absolute;top:0;left:0;width:2px;height:100%;background:#e74c3c;z-index:9;pointer-events:none;}
.wkbg{background:var(--color-background-tertiary);}
.msbg{background:#fffcf0;}
.ns td{border-top:2px solid var(--color-border-secondary)!important;}
.uk-modal-dialog{background:#111 !important;color:#f0f0f0 !important;border-radius:14px !important;border:1px solid #333 !important;}
.uk-modal-title{color:#fff !important;font-size:16px !important;font-weight:600 !important;}
.uk-form-label{color:#aaa !important;font-size:11px !important;font-weight:500 !important;margin-top:10px !important;display:block;}
.uk-input,.uk-select{background:#1e1e1e !important;border:1px solid #444 !important;color:#fff !important;border-radius:8px !important;font-size:13px !important;padding:8px 12px !important;}
.uk-input:focus,.uk-select:focus{border-color:#378ADD !important;outline:none !important;}
.uk-select option{background:#1e1e1e;color:#fff;}
.modal-btns{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;}
.btn-save{background:#378ADD;color:#fff;border:none;padding:8px 20px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.btn-save:hover{background:#185FA5;}
.btn-del{background:#c0392b;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
.btn-del:hover{background:#922b21;}
.btn-cancel{background:#2a2a2a;color:#ccc;border:1px solid #444;padding:8px 16px;border-radius:8px;font-size:12px;cursor:pointer;}
.btn-cancel:hover{background:#333;}
.uk-button-primary{background:#378ADD !important;border-color:#378ADD !important;}
.uk-button-primary:hover{background:#185FA5 !important;}
.uk-button-default{background:#1e1e1e !important;color:#ccc !important;border-color:#444 !important;}
.toolbar-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center;}
.tbtn{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:6px 14px;border-radius:8px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;font-weight:500;}
.tbtn:hover{background:var(--color-background-secondary);}
.tbtn.primary{background:#378ADD;color:#fff;border-color:#378ADD;}
.tbtn.primary:hover{background:#185FA5;}
.tbtn.success{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.tbtn.success:hover{background:#0F6E56;}
.gselect{font-size:11px;padding:5px 10px;border-radius:8px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;}
.toast-box{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:9px 20px;border-radius:20px;font-size:12px;z-index:9999;opacity:0;transition:opacity .3s;border:1px solid #333;}
.toast-box.show{opacity:1;}
.status-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:8px;font-weight:700;}
</style>

<script>
const S=new Date('2026-05-05'),DAYS=28,DW=22;
const SEC={
  'Gold Onboarding':{bg:'#FFFBEA',tx:'#7B5800',bd:'#E6C200'},
  'Silver Onboarding':{bg:'#F4F4F4',tx:'#3A3A3A',bd:'#BBBBBB'},
  'Gold Offboarding':{bg:'#FFF0DC',tx:'#7A3B00',bd:'#FFA040'},
  'Silver Offboarding':{bg:'#EEEEF8',tx:'#2A2A5A',bd:'#AAAACC'},
  'Speed & Retention Analysis':{bg:'#EDFAED',tx:'#1A4D1A',bd:'#66BB66'},
  'End-to-End Testing':{bg:'#FDF0EF',tx:'#7A1A1A',bd:'#F4A9A8'},
  'Final Deliverables':{bg:'#EBF3FF',tx:'#0C3070',bd:'#7EB5F5'},
};
const OWN={Leo:'#7F77DD',Khyati:'#1D9E75',Anisha:'#378ADD',Burak:'#D85A30'};
function oc(o){for(const[k,v]of Object.entries(OWN))if(o&&o.includes(k))return v;return'#888780';}
function ds(s){if(!s)return 0;const p=s.includes('-')?s.split('-'):[s.split('/')[0],s.split('/')[1]];const[m,d]=[parseInt(p[0]),parseInt(p[1])];return Math.round((new Date(2026,m-1,d)-S)/86400000);}
const MS={14:'TRACE due (May 19)',27:'Jun 1 deadline'};

let tasks=[
  {sec:'Gold Onboarding',task:'US-01: Drop-off detection (deal stage)',owner:'Leo',sd:'05/05',ed:'05/05',status:'Complete'},
  {sec:'Gold Onboarding',task:'US-02: TP connection status check',owner:'Leo',sd:'05/05',ed:'05/05',status:'Complete'},
  {sec:'Gold Onboarding',task:'US-03: Connection-reminder cadence (Path A)',owner:'Khyati',sd:'05/05',ed:'05/05',status:'Complete'},
  {sec:'Gold Onboarding',task:'US-04: Connected-path logging (Path B)',owner:'TBD',sd:'05/05',ed:'05/05',status:'Complete'},
  {sec:'Gold Onboarding',task:'US-05: Welcome sequence trigger',owner:'Burak',sd:'05/05',ed:'05/07',status:'In Progress'},
  {sec:'Gold Onboarding',task:'US-06: TP Premium manual-toggle escalation',owner:'TBD',sd:'05/06',ed:'05/08',status:'Not Started'},
  {sec:'Gold Onboarding',task:'US-07: Task-complete + contact-record note',owner:'Burak',sd:'05/07',ed:'05/08',status:'Not Started'},
  {sec:'Gold Onboarding',task:'US-08: Slack error escalation',owner:'TBD',sd:'05/06',ed:'05/08',status:'Not Started'},
  {sec:'Gold Onboarding',task:'US-09: E2E happy-path testing (sandbox)',owner:'Everyone',sd:'05/09',ed:'05/11',status:'Not Started'},
  {sec:'Gold Onboarding',task:'US-11: Historical replay validation',owner:'TBD',sd:'05/12',ed:'05/15',status:'Not Started'},
  {sec:'Gold Onboarding',task:'Gold onboarding sign-off',owner:'Burak',sd:'05/15',ed:'05/16',status:'Not Started'},
  {sec:'Silver Onboarding',task:'Silver Gherkin stories (from Gold)',owner:'Leo',sd:'05/09',ed:'05/11',status:'Not Started'},
  {sec:'Silver Onboarding',task:'Silver connection-reminder cadence',owner:'Khyati',sd:'05/11',ed:'05/15',status:'Not Started'},
  {sec:'Silver Onboarding',task:'Silver welcome sequence trigger',owner:'Anisha',sd:'05/12',ed:'05/15',status:'Not Started'},
  {sec:'Silver Onboarding',task:'Silver 28-day nudge auto-task',owner:'Leo',sd:'05/13',ed:'05/15',status:'Not Started'},
  {sec:'Silver Onboarding',task:'Silver E2E sandbox test',owner:'Burak',sd:'05/16',ed:'05/18',status:'Not Started'},
  {sec:'Gold Offboarding',task:'Cancellation confirmation email',owner:'Anisha',sd:'05/13',ed:'05/14',status:'Not Started'},
  {sec:'Gold Offboarding',task:'30-day refund eligibility check',owner:'Leo',sd:'05/14',ed:'05/16',status:'Not Started'},
  {sec:'Gold Offboarding',task:'TP removal scheduling logic',owner:'Khyati',sd:'05/15',ed:'05/17',status:'Not Started'},
  {sec:'Gold Offboarding',task:'Offboarding offer email + close',owner:'Anisha',sd:'05/16',ed:'05/17',status:'Not Started'},
  {sec:'Gold Offboarding',task:'Gold offboarding integration test',owner:'Burak',sd:'05/18',ed:'05/20',status:'Not Started'},
  {sec:'Silver Offboarding',task:'Silver offboarding workflow',owner:'Khyati',sd:'05/17',ed:'05/19',status:'Not Started'},
  {sec:'Silver Offboarding',task:'Silver offboarding test',owner:'Burak',sd:'05/20',ed:'05/21',status:'Not Started'},
  {sec:'Speed & Retention Analysis',task:'Baseline cycle time EDA (23K tickets)',owner:'Leo',sd:'05/12',ed:'05/15',status:'Not Started'},
  {sec:'Speed & Retention Analysis',task:'Agent replay test (auto vs manual)',owner:'Anisha',sd:'05/16',ed:'05/20',status:'Not Started'},
  {sec:'Speed & Retention Analysis',task:'Onboarding speed vs churn cohort',owner:'Khyati',sd:'05/17',ed:'05/21',status:'Not Started'},
  {sec:'Speed & Retention Analysis',task:'Retention + nudge adherence analysis',owner:'Anisha',sd:'05/20',ed:'05/23',status:'Not Started'},
  {sec:'End-to-End Testing',task:'Full onboarding E2E (Gold + Silver)',owner:'Burak',sd:'05/19',ed:'05/21',status:'Not Started'},
  {sec:'End-to-End Testing',task:'Full offboarding E2E (Gold + Silver)',owner:'Burak',sd:'05/21',ed:'05/23',status:'Not Started'},
  {sec:'End-to-End Testing',task:'Escalation + edge-case scenarios',owner:'Burak',sd:'05/22',ed:'05/24',status:'Not Started'},
  {sec:'End-to-End Testing',task:'Bug fixes and polish',owner:'Anisha+Khyati+Leo',sd:'05/23',ed:'05/26',status:'Not Started'},
  {sec:'Final Deliverables',task:'TRACE submission (due May 19)',owner:'Team',sd:'05/17',ed:'05/19',status:'Not Started'},
  {sec:'Final Deliverables',task:'Executive summary + final slides',owner:'Team',sd:'05/24',ed:'05/28',status:'Not Started'},
  {sec:'Final Deliverables',task:'Handoff documentation',owner:'Leo+Khyati',sd:'05/25',ed:'05/28',status:'Not Started'},
  {sec:'Final Deliverables',task:'Final presentation prep + rehearsal',owner:'Team',sd:'05/28',ed:'06/01',status:'Not Started'},
];

let editIdx=-1;

function showToast(msg,ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.borderColor=ok?'#1D9E75':'#e74c3c';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

function populateFilters(){
  const secs=[...new Set(tasks.map(t=>t.sec))];
  const owns=[...new Set(tasks.map(t=>t.owner.split('+')[0].trim()))];
  const fs=document.getElementById('filterSec');
  const fo=document.getElementById('filterOwn');
  const sv=fs.value,ov=fo.value;
  fs.innerHTML='<option value="">All sections</option>'+secs.map(s=>`<option${s===sv?' selected':''}>${s}</option>`).join('');
  fo.innerHTML='<option value="">All owners</option>'+owns.map(o=>`<option${o===ov?' selected':''}>${o}</option>`).join('');
}

function renderGantt(){
  const fS=document.getElementById('filterSec').value;
  const fO=document.getElementById('filterOwn').value;
  const vis=tasks.filter(t=>(!fS||t.sec===fS)&&(!fO||t.owner.includes(fO)));
  document.getElementById('taskCount').textContent=vis.length;
  const tbl=document.getElementById('g');tbl.innerHTML='';
  const thead=tbl.createTHead();const hr=thead.insertRow();
  function mth(txt,cls,w){
    const t=document.createElement('th');t.textContent=txt;
    if(cls)t.className=cls;
    if(w){t.style.width=w+'px';t.style.minWidth=w+'px';}
    hr.appendChild(t);return t;
  }
  mth('Section','lh');mth('Task','th2');
  const oth=mth('Owner','',76);oth.style.textAlign='center';
  for(let i=0;i<DAYS;i++){
    const dt=new Date(S);dt.setDate(dt.getDate()+i);
    const wd=dt.getDay(),isWk=wd===0||wd===6,isTd=i===0,isMs=!!MS[i];
    const cls=isTd?'tdy':isMs?'ms-h':isWk?'wk':'';
    const t=mth('',cls,DW);
    if(dt.getDate()%3===1||i===0)t.textContent=(dt.getMonth()+1)+'/'+dt.getDate();
    if(isMs)t.title=MS[i];
  }
  const tbody=tbl.createTBody();
  let lastSec='';
  vis.forEach(row=>{
    const{sec,task,owner,sd,ed,status}=row;
    const ri=tasks.indexOf(row);
    const sc=SEC[sec]||{bg:'#eee',tx:'#333',bd:'#ccc'};
    const isNew=sec!==lastSec;lastSec=sec;
    const c=oc(owner);
    const tr=tbody.insertRow();
    if(isNew)tr.className='ns';
    const tdS=tr.insertCell();tdS.className='sl';
    tdS.style.cssText=`background:${sc.bg};color:${sc.tx};border-left:3px solid ${sc.bd};`;
    tdS.textContent=isNew?sec:'';
    tdS.onclick=()=>openModal(ri);
    const tdT=tr.insertCell();tdT.className='tl';tdT.title=task;tdT.textContent=task;
    tdT.onclick=()=>openModal(ri);
    const tdO=tr.insertCell();tdO.style.cssText='text-align:center;padding:2px 4px;';
    const badge=document.createElement('span');badge.className='ob';badge.style.background=c;
    badge.textContent=owner.split('+')[0].trim().substring(0,7);
    badge.onclick=()=>openModal(ri);
    tdO.appendChild(badge);
    const sDay=ds(sd),eDay=ds(ed);
    for(let i=0;i<DAYS;i++){
      const dt=new Date(S);dt.setDate(dt.getDate()+i);
      const wd=dt.getDay(),isWk=wd===0||wd===6,isMs=!!MS[i];
      const td=tr.insertCell();td.className='dc';
      if(isWk)td.classList.add('wkbg');
      if(isMs)td.classList.add('msbg');
      if(i===0){const m=document.createElement('div');m.className='tdl';td.appendChild(m);}
      if(i===sDay){
        const span=Math.max(eDay-sDay+1,1);
        const bar=document.createElement('div');bar.className='bar';
        if(status==='Complete'){bar.classList.add('done');bar.style.background='#52BE80';}
        else if(status==='In Progress'){bar.classList.add('ip');bar.style.background=c;}
        else bar.style.background=c;
        bar.style.width=(span*DW-3)+'px';
        if(span>2)bar.textContent=owner.split('+')[0].trim().substring(0,6);
        bar.onclick=()=>openModal(ri);
        td.appendChild(bar);
      }
    }
  });
}

function openModal(idx){
  editIdx=idx;
  const isNew=idx===-1;
  const row=isNew?{sec:'Gold Onboarding',task:'',owner:'',sd:'05/05',ed:'05/10',status:'Not Started'}:tasks[idx];
  document.getElementById('modalTitle').textContent=isNew?'Add new task':'Edit task';
  const secSel=document.getElementById('m-sec');
  secSel.innerHTML=Object.keys(SEC).map(s=>`<option${s===row.sec?' selected':''}>${s}</option>`).join('');
  document.getElementById('m-task').value=row.task;
  document.getElementById('m-own').value=row.owner;
  document.getElementById('m-sd').value=row.sd;
  document.getElementById('m-ed').value=row.ed;
  document.getElementById('m-status').value=row.status;
  document.getElementById('delBtn').style.display=isNew?'none':'inline-block';
  UIkit.modal('#editModal').show();
}

function saveTask(){
  const row={
    sec:document.getElementById('m-sec').value,
    task:document.getElementById('m-task').value.trim(),
    owner:document.getElementById('m-own').value.trim(),
    sd:document.getElementById('m-sd').value.trim(),
    ed:document.getElementById('m-ed').value.trim(),
    status:document.getElementById('m-status').value,
  };
  if(!row.task){showToast('Task name is required',false);return;}
  if(editIdx===-1){tasks.push(row);showToast('Task added');}
  else{tasks[editIdx]=row;showToast('Task saved');}
  UIkit.modal('#editModal').hide();
  populateFilters();renderGantt();
}

function deleteTask(){
  if(editIdx<0)return;
  tasks.splice(editIdx,1);
  UIkit.modal('#editModal').hide();
  populateFilters();renderGantt();
  showToast('Task deleted');
}

function exportCSV(){
  const hdr=['Section','Task','Owner','Start Date','End Date','Status'];
  const rows=[hdr,...tasks.map(t=>[t.sec,t.task,t.owner,t.sd,t.ed,t.status])];
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='8020_gantt.csv';a.click();
  showToast('CSV exported');
}

function importCSV(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    const lines=ev.target.result.split('\n').filter(l=>l.trim());
    const header=lines[0].split(',').map(h=>h.replace(/"/g,'').trim().toLowerCase());
    const si=header.findIndex(h=>h.includes('section'));
    const ti=header.findIndex(h=>h.includes('task'));
    const oi=header.findIndex(h=>h.includes('owner'));
    const sdi=header.findIndex(h=>h.includes('start'));
    const edi=header.findIndex(h=>h.includes('end'));
    const sti=header.findIndex(h=>h.includes('status'));
    if(si<0||ti<0){showToast('CSV missing Section or Task column',false);return;}
    const imported=[];
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].match(/(".*?"|[^,]+)(?=,|$)/g)||[];
      const clean=cols.map(c=>c.replace(/^"|"$/g,'').trim());
      if(!clean[ti])continue;
      imported.push({
        sec:clean[si]||'Gold Onboarding',
        task:clean[ti]||'',
        owner:oi>=0?clean[oi]||'TBD':'TBD',
        sd:sdi>=0?clean[sdi]||'05/05':'05/05',
        ed:edi>=0?clean[edi]||'05/10':'05/10',
        status:sti>=0?clean[sti]||'Not Started':'Not Started',
      });
    }
    if(imported.length===0){showToast('No valid tasks found in CSV',false);return;}
    tasks=imported;
    populateFilters();renderGantt();
    showToast(`Imported ${imported.length} tasks`);
  };
  reader.readAsText(file);
  e.target.value='';
}

</style></head><body>

<select class="gselect" id="filterSec" onchange="renderGantt()"><option value="">All sections</option></select>

<div id="editModal" uk-modal><div class="uk-modal-dialog uk-modal-body" style="min-width:360px;max-width:440px;">

<label class="uk-form-label">End date (MM/DD)</label><input class="uk-input" id="m-ed" type="text">

<script src="https://cdn.jsdelivr.net/npm/uikit@3.21.0/dist/js/uikit.min.js"><\/script>
<script src="https://cdn.jsdelivr.net/npm/uikit@3.21.0/dist/js/uikit-icons.min.js"><\/script>
<script>
const S=new Date('2026-05-05'),DAYS=28,DW=22;
const SEC=${secData};
const OWN=${ownData};
function oc(o){for(const[k,v]of Object.entries(OWN))if(o&&o.includes(k))return v;return'#888780';}
function ds(s){if(!s)return 0;const p=s.includes('-')?s.split('-'):[s.split('/')[0],s.split('/')[1]];const[m,d]=[parseInt(p[0]),parseInt(p[1])];return Math.round((new Date(2026,m-1,d)-S)/86400000);}
const MS={14:'TRACE due',27:'Jun 1 deadline'};
let tasks=${data};
let editIdx=-1;
function showToast(msg,ok=true){const t=document.getElementById('toast');t.textContent=msg;t.style.borderColor=ok?'#1D9E75':'#e74c3c';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
function populateFilters(){const secs=[...new Set(tasks.map(t=>t.sec))];const owns=[...new Set(tasks.map(t=>t.owner.split('+')[0].trim()))];const fs=document.getElementById('filterSec');const fo=document.getElementById('filterOwn');const sv=fs.value,ov=fo.value;fs.innerHTML='<option value="">All sections</option>'+secs.map(s=>'<option'+(s===sv?' selected':'')+'>'+s+'</option>').join('');fo.innerHTML='<option value="">All owners</option>'+owns.map(o=>'<option'+(o===ov?' selected':'')+'>'+o+'</option>').join('');}
function renderGantt(){const fS=document.getElementById('filterSec').value;const fO=document.getElementById('filterOwn').value;const vis=tasks.filter(t=>(!fS||t.sec===fS)&&(!fO||t.owner.includes(fO)));document.getElementById('taskCount').textContent=vis.length;const tbl=document.getElementById('g');tbl.innerHTML='';const thead=tbl.createTHead();const hr=thead.insertRow();function mth(txt,cls,w){const t=document.createElement('th');t.textContent=txt;if(cls)t.className=cls;if(w){t.style.width=w+'px';t.style.minWidth=w+'px';}hr.appendChild(t);return t;}mth('Section','lh');mth('Task','th2');const oth=mth('Owner','',76);oth.style.textAlign='center';for(let i=0;i<DAYS;i++){const dt=new Date(S);dt.setDate(dt.getDate()+i);const wd=dt.getDay(),isWk=wd===0||wd===6,isTd=i===0,isMs=!!MS[i];const cls=isTd?'tdy':isMs?'ms-h':isWk?'wk':'';const t=mth('',cls,DW);if(dt.getDate()%3===1||i===0)t.textContent=(dt.getMonth()+1)+'/'+dt.getDate();if(isMs)t.title=MS[i];}const tbody=tbl.createTBody();let lastSec='';vis.forEach(row=>{const{sec,task,owner,sd,ed,status}=row;const ri=tasks.indexOf(row);const sc=SEC[sec]||{bg:'#eee',tx:'#333',bd:'#ccc'};const isNew=sec!==lastSec;lastSec=sec;const c=oc(owner);const tr=tbody.insertRow();if(isNew)tr.className='ns';const tdS=tr.insertCell();tdS.className='sl';tdS.style.cssText='background:'+sc.bg+';color:'+sc.tx+';border-left:3px solid '+sc.bd+';';tdS.textContent=isNew?sec:'';tdS.onclick=()=>openModal(ri);const tdT=tr.insertCell();tdT.className='tl';tdT.title=task;tdT.textContent=task;tdT.onclick=()=>openModal(ri);const tdO=tr.insertCell();tdO.style.cssText='text-align:center;padding:2px 4px;';const badge=document.createElement('span');badge.className='ob';badge.style.background=c;badge.textContent=owner.split('+')[0].trim().substring(0,7);badge.onclick=()=>openModal(ri);tdO.appendChild(badge);const sDay=ds(sd),eDay=ds(ed);for(let i=0;i<DAYS;i++){const dt=new Date(S);dt.setDate(dt.getDate()+i);const wd=dt.getDay(),isWk=wd===0||wd===6,isMs=!!MS[i];const td=tr.insertCell();td.className='dc';if(isWk)td.classList.add('wkbg');if(isMs)td.classList.add('msbg');if(i===0){const m=document.createElement('div');m.className='tdl';td.appendChild(m);}if(i===sDay){const span=Math.max(eDay-sDay+1,1);const bar=document.createElement('div');bar.className='bar';if(status==='Complete'){bar.classList.add('done');bar.style.background='#52BE80';}else if(status==='In Progress'){bar.classList.add('ip');bar.style.background=c;}else bar.style.background=c;bar.style.width=(span*DW-3)+'px';if(span>2)bar.textContent=owner.split('+')[0].trim().substring(0,6);bar.onclick=()=>openModal(ri);td.appendChild(bar);}}});}
function openModal(idx){editIdx=idx;const isNew=idx===-1;const row=isNew?{sec:'Gold Onboarding',task:'',owner:'',sd:'05/05',ed:'05/10',status:'Not Started'}:tasks[idx];document.getElementById('modalTitle').textContent=isNew?'Add new task':'Edit task';document.getElementById('m-sec').innerHTML=Object.keys(SEC).map(s=>'<option'+(s===row.sec?' selected':'')+'>'+s+'</option>').join('');document.getElementById('m-task').value=row.task;document.getElementById('m-own').value=row.owner;document.getElementById('m-sd').value=row.sd;document.getElementById('m-ed').value=row.ed;document.getElementById('m-status').value=row.status;document.getElementById('delBtn').style.display=isNew?'none':'inline-block';UIkit.modal('#editModal').show();}
function saveTask(){const row={sec:document.getElementById('m-sec').value,task:document.getElementById('m-task').value.trim(),owner:document.getElementById('m-own').value.trim(),sd:document.getElementById('m-sd').value.trim(),ed:document.getElementById('m-ed').value.trim(),status:document.getElementById('m-status').value};if(!row.task){showToast('Task name is required',false);return;}if(editIdx===-1){tasks.push(row);showToast('Task added');}else{tasks[editIdx]=row;showToast('Task saved');}UIkit.modal('#editModal').hide();populateFilters();renderGantt();}
function deleteTask(){if(editIdx<0)return;tasks.splice(editIdx,1);UIkit.modal('#editModal').hide();populateFilters();renderGantt();showToast('Task deleted');}
function exportCSV(){const rows=[['Section','Task','Owner','Start Date','End Date','Status'],...tasks.map(t=>[t.sec,t.task,t.owner,t.sd,t.ed,t.status])];const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\\n');const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='8020_gantt.csv';a.click();showToast('CSV exported');}
function importCSV(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(ev){const lines=ev.target.result.split('\\n').filter(l=>l.trim());const header=lines[0].split(',').map(h=>h.replace(/"/g,'').trim().toLowerCase());const si=header.findIndex(h=>h.includes('section'));const ti=header.findIndex(h=>h.includes('task'));const oi=header.findIndex(h=>h.includes('owner'));const sdi=header.findIndex(h=>h.includes('start'));const edi=header.findIndex(h=>h.includes('end'));const sti=header.findIndex(h=>h.includes('status'));if(si<0||ti<0){showToast('CSV missing Section or Task column',false);return;}const imported=[];for(let i=1;i<lines.length;i++){const cols=lines[i].match(/(".*?"|[^,]+)(?=,|$)/g)||[];const clean=cols.map(c=>c.replace(/^"|"$/g,'').trim());if(!clean[ti])continue;imported.push({sec:clean[si]||'Gold Onboarding',task:clean[ti]||'',owner:oi>=0?clean[oi]||'TBD':'TBD',sd:sdi>=0?clean[sdi]||'05/05':'05/05',ed:edi>=0?clean[edi]||'05/10':'05/10',status:sti>=0?clean[sti]||'Not Started':'Not Started'});}if(!imported.length){showToast('No valid tasks found',false);return;}tasks=imported;populateFilters();renderGantt();showToast('Imported '+imported.length+' tasks');};reader.readAsText(file);e.target.value='';}
populateFilters();renderGantt();
<\/script></body></html>`;
  const a=document.createElement('a');
  a.href='data:text/html;charset=utf-8,'+encodeURIComponent(html);
  a.download='8020_gantt.html';a.click();
  showToast('HTML file downloaded!');
}

populateFilters();
renderGantt();
</script>
